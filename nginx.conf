user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 8192;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Log Optimization (Drop debug verbosity in production to eliminate disk I/O bottlenecks)
    access_log off;
    error_log /var/log/nginx/error.log crit;

    # Kernel-level memory maps and network sockets tweaking
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # RAM-disk Cache Zone definition (Allocates 256MB in-memory pathing for ultra-fast replication)
    # Note: Requires /dev/shm to be mounted and available
    proxy_cache_path /dev/shm/nginx_cache levels=1:2 keys_zone=ephemeral_zone:256m max_size=512m inactive=10m use_temp_path=off;

    # Optimized Request Buffering
    client_body_buffer_size 128k;
    client_max_body_size 50m;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # Compression Configuration
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss image/svg+xml;

    # Virtual Host Inclusions
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}
